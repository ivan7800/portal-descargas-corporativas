<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Descargas Corporativas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F4F2EE;
    --surface: #FAFAF8;
    --surface2: #EEECEA;
    --border: #D8D5CF;
    --border2: #C5C1BA;
    --text: #1A1916;
    --text2: #6B6760;
    --text3: #9E9A94;
    --accent: #2D5BE3;
    --accent-bg: #EEF2FD;
    --accent-text: #1A3A9E;
    --badge-bg: #FFF3CD;
    --badge-text: #92620A;
    --badge-border: #F5D87A;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1C1C1A;
      --surface2: #242422;
      --border: #2E2E2B;
      --border2: #3A3A36;
      --text: #F0EDE8;
      --text2: #9E9A94;
      --text3: #5C5A55;
      --accent: #5B82F0;
      --accent-bg: #1A2444;
      --accent-text: #8BAAF5;
      --badge-bg: #2A2000;
      --badge-text: #F5C842;
      --badge-border: #5C4500;
    }
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .site-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: #0055A5;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { fill: white; width: 22px; height: 22px; }

  .logo-name {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .logo-name span {
    font-weight: 300;
    color: var(--text2);
  }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
  }

  /* HERO */
  .hero {
    padding: 2.5rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .hero h1 {
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .hero h1 strong { font-weight: 500; }

  .hero p {
    font-size: 15px;
    color: var(--text2);
    max-width: 480px;
    line-height: 1.6;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
    max-width: 340px;
  }

  .search-wrap svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    stroke: var(--text3);
    fill: none;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    transition: border-color 0.15s;
    outline: none;
  }

  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--border2); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .filter-btn:hover {
    border-color: var(--border2);
    color: var(--text);
    background: var(--surface);
  }

  .filter-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
    font-weight: 500;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .stats-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }

  .stats-count span { color: var(--text); font-weight: 500; }

  /* GRID */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .app-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1rem 0.9rem;
    display: flex;
    flex-direction: column;
    gap: 7px;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: fadeIn 0.2s ease both;
    position: relative;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .app-card:hover {
    border-color: var(--border2);
    box-shadow: var(--shadow);
  }

  .app-card.hidden { display: none; }

  /* BADGE RECOMENDADO */
  .badge-rec {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--badge-bg);
    color: var(--badge-text);
    border: 1px solid var(--badge-border);
    border-radius: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    text-transform: uppercase;
    line-height: 1.4;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .app-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .app-meta {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
    padding-right: 28px; /* espacio para badge */
  }

  .app-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .app-tag {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.02em;
  }

  .app-desc {
    font-size: 12.5px;
    color: var(--text2);
    line-height: 1.45;
  }

  /* VERSIÓN */
  .app-version {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .app-version::before {
    content: 'v';
    opacity: 0.5;
  }

  .app-platform {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .app-platform::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--text3);
    opacity: 0.5;
    flex-shrink: 0;
  }

  .app-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    margin-top: auto;
  }

  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-bg);
    border: none;
    border-radius: 7px;
    padding: 6px 11px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.12s;
    white-space: nowrap;
  }

  .dl-btn:hover { opacity: 0.8; }

  .dl-btn svg {
    width: 13px;
    height: 13px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 3rem 0;
    color: var(--text3);
    font-size: 14px;
    display: none;
  }

  /* FOOTER */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 1.25rem 2rem;
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    margin-top: 3rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

const allTags = ["Todos", ...new Set(apps.map(a => a.tag))];
let activeTag = "Todos";

// Render filters
const filtersEl = document.getElementById("filters");
allTags.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "filter-btn" + (t === "Todos" ? " active" : "");
  btn.textContent = t;
  btn.addEventListener("click", () => {
    activeTag = t;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    filterApps();
  });
  filtersEl.appendChild(btn);
});

const iconDownload = `<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

// Render cards
const grid = document.getElementById("grid");

  const card = document.createElement("div");
  card.className = "app-card";
  card.dataset.name = app.name.toLowerCase() + " " + app.desc.toLowerCase();
  card.dataset.tag = app.tag;
  card.style.animationDelay = (i * 0.018) + "s";
  card.innerHTML = `

      <div class="app-icon" style="background:${app.bg}">${app.icon}</div>
      <div class="app-meta">
        <div class="app-name">${app.name}</div>
        <span class="app-tag">${app.tag}</span>
      </div>
    </div>
    <div class="app-desc">${app.desc}</div>
    <div class="app-footer">
      <span class="app-version">${app.version}</span>
      <span class="app-platform">${app.platform}</span>
    </div>
    <a class="dl-btn" href="${app.url}" target="_blank" rel="noopener noreferrer">
      ${iconDownload} Descargar
    </a>
  `;
  grid.appendChild(card);
});

function filterApps() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const cards = grid.querySelectorAll(".app-card");
  let visible = 0;
  cards.forEach(card => {
    const matchTag = activeTag === "Todos" || card.dataset.tag === activeTag;
    const matchQ = !q || card.dataset.name.includes(q);
    const show = matchTag && matchQ;
    card.classList.toggle("hidden", !show);
    if (show) visible++;
  });
  const label = document.getElementById("count-label");
  const noRes = document.getElementById("no-results");
  label.innerHTML = `<span>${visible}</span> aplicaciones`;
  document.getElementById("header-count").textContent = visible + " APPS";
  noRes.style.display = visible === 0 ? "block" : "none";
}

document.getElementById("search").addEventListener("input", filterApps);
filterApps();
</script>
</body>
</html>
